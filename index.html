<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Números circulares</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="card">
  <div class="inputs">
    <input id="n1" maxlength="2" inputmode="numeric" aria-label="Número 1">
    <input id="n2" maxlength="2" inputmode="numeric" aria-label="Número 2">
    <input id="n3" maxlength="2" inputmode="numeric" aria-label="Número 3">
  </div>

  <div id="preview">⓪⓪⓪</div>
  <div id="percent">0%</div>

  <div class="progress"><div></div></div>

  <div id="error"></div>

  <div class="buttons">
    <button id="sliderBtn">☰ Sliders</button>
    <button id="copyNums">Copiar números</button>
    <button id="copyAll">Copiar números + %</button>
    <button id="clear">Borrar</button>
  </div>
</div>

<div class="slider-menu" id="sliderMenu">
  <div class="slider-content">
    <h3 id="sliderTitle">⓪⓪⓪ 0%</h3>
    
    <div class="slider-item">
      <div class="slider-label">
        <span>Ataque</span>
        <span id="sliderVal1">0</span>
      </div>
      <div class="slider-wrapper">
        <div class="slider-track">
          <div class="slider-fill" id="sliderFill1"></div>
        </div>
        <div class="slider-marks"></div>
        <input type="range" id="slider1" min="0" max="15" value="0" step="1">
      </div>
    </div>
    
    <div class="slider-item">
      <div class="slider-label">
        <span>Defensa</span>
        <span id="sliderVal2">0</span>
      </div>
      <div class="slider-wrapper">
        <div class="slider-track">
          <div class="slider-fill" id="sliderFill2"></div>
        </div>
        <div class="slider-marks"></div>
        <input type="range" id="slider2" min="0" max="15" value="0" step="1">
      </div>
    </div>
    
    <div class="slider-item">
      <div class="slider-label">
        <span>PS</span>
        <span id="sliderVal3">0</span>
      </div>
      <div class="slider-wrapper">
        <div class="slider-track">
          <div class="slider-fill" id="sliderFill3"></div>
        </div>
        <div class="slider-marks"></div>
        <input type="range" id="slider3" min="0" max="15" value="0" step="1">
      </div>
    </div>
    
    <div class="slider-buttons">
      <button id="sliderCancel">Cancelar</button>
      <button id="sliderApply">Aplicar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copiado ✔</div>

<script src="script.js"></script>

</body>
</html>
